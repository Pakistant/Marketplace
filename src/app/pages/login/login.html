<section class="row justify-content-center">
  <div class="col-lg-6 col-xl-5">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="h3 fw-bold mb-2">Connexion producteur</h1>
          <p class="text-muted mb-0">Accédez à votre tableau de bord et gérez vos produits et commandes.</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input id="email" name="email" type="email" class="form-control" [(ngModel)]="email" required />
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Mot de passe</label>
            <input id="password" name="password" type="password" class="form-control" [(ngModel)]="password" required />
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <button class="btn btn-primary w-100" type="submit" [disabled]="isSubmitting || loginForm.invalid">
            <span *ngIf="!isSubmitting">Se connecter</span>
            <span *ngIf="isSubmitting">Connexion...</span>
          </button>
        </form>

        <div class="mt-3 text-center text-muted small">
          Compte de test : ouest@marketdouala.cm / password123
        </div>
      </div>
    </div>
  </div>
</section>
